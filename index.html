<!DOCTYPE html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Xinyi SpellQuest</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Xinyi SpellQuest">
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluent/48/000000/wizard.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluent/180/000000/wizard.png">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        iosBg: { light: '#f4f4f9', dark: '#0a0a0c' },
                        iosCard: { light: 'rgba(255, 255, 255, 0.65)', dark: 'rgba(20, 20, 25, 0.65)' },
                        iosText: { light: '#1c1c1e', dark: '#f5f5f7' }
                    }
                }
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none !important;
            -webkit-tap-highlight-color: transparent;
        }
        input, textarea, [contenteditable="true"] {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
            padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
            /* 优化：加大顶部间距，避开全面屏顶部刘海/灵动岛及边缘触控死角 */
            padding-top: calc(env(safe-area-inset-top) + 24px); 
            background: radial-gradient(circle at 50% 0%, rgba(0, 122, 255, 0.08), transparent 60%), 
                        radial-gradient(circle at 10% 100%, rgba(52, 199, 89, 0.05), transparent 40%),
                        #f4f4f9;
            transition: background 0.4s cubic-bezier(0.25, 1, 0.5, 1), color 0.3s ease;
        }
        
        .dark body {
            background: radial-gradient(circle at 50% 0%, rgba(0, 122, 255, 0.12), transparent 50%), 
                        radial-gradient(circle at 90% 100%, rgba(255, 59, 48, 0.05), transparent 40%),
                        #0a0a0c;
        }

        html, body { position: relative; overflow: hidden; height: 100%; -webkit-overflow-scrolling: touch; }
        
        /* iOS High-Fidelity Glassmorphism */
        .ios-depth {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px) saturate(210%);
            -webkit-backdrop-filter: blur(30px) saturate(210%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04),
                        0 1px 2px 0 rgba(0, 0, 0, 0.02),
                        inset 0 1px 0 0 rgba(255, 255, 255, 0.8);
        }
        .dark .ios-depth {
            background: rgba(20, 20, 25, 0.75);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6),
                        0 1px 0px 0 rgba(255, 255, 255, 0.03),
                        inset 0 1px 0px 0 rgba(255, 255, 255, 0.05);
        }

        /* 优化：为下拉框触发器增加一层隐形防错手热区 */
        #unitSelectorTrigger::after {
            content: '';
            position: absolute;
            top: -10px;
            bottom: -10px;
            left: -10px;
            right: -10px;
            z-index: 1;
        }

        /* 2D Elastic Card with Safari Backdrop-Filter Compatibility Fix */
        .card-perspective {
            position: relative;
            flex-grow: 1; 
            display: flex;
            align-items: center; 
            justify-content: center;
            width: 100%;
            touch-action: none; /* Prevent scrolling during swipe gestures on the card */
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            max-height: 380px; 
            min-height: 250px;
        }
        
        .card-front, .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-radius: 28px;
            box-sizing: border-box;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1), opacity 0.4s ease, visibility 0.4s ease;
            -webkit-transition: -webkit-transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1), opacity 0.4s ease, visibility 0.4s ease;
            will-change: transform, opacity;
        }
        
        .card-front { 
            transform: scaleX(1); 
            z-index: 2; 
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .card-back { 
            transform: scaleX(0); 
            z-index: 1; 
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* iOS Safari Fix: Toggle opacity, visibility, transform, and pointer-events dynamically to prevent backdrop-filter bleeding and click-throughs */
        .card-inner.is-flipped .card-front {
            transform: scaleX(0);
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .card-inner.is-flipped .card-back {
            transform: scaleX(1);
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
            z-index: 3; /* Ensure flipped card-back is fully interactive */
        }

        .shimmer {
            background: linear-gradient(90deg, rgba(229, 229, 234, 0.3) 25%, rgba(242, 242, 247, 0.6) 50%, rgba(229, 229, 234, 0.3) 75%);
            background-size: 200% 100%;
            animation: loading-shimmer 1.6s infinite;
        }
        .dark .shimmer {
            background: linear-gradient(90deg, rgba(58, 58, 60, 0.3) 25%, rgba(72, 72, 74, 0.6) 50%, rgba(58, 58, 60, 0.3) 75%);
            background-size: 200% 100%;
        }
        @keyframes loading-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .progress-container { width: 100%; background-color: rgba(0, 0, 0, 0.05); border-radius: 999px; height: 5px; overflow: hidden; }
        .dark .progress-container { background-color: rgba(255, 255, 255, 0.08); }
        .progress-bar { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #007aff, #34a8ff); transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        
        .shake { animation: ios-shake 0.45s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes ios-shake { 15%, 85% { transform: translate3d(-3px, 0, 0); } 30%, 70% { transform: translate3d(4px, 0, 0); } 45%, 65% { transform: translate3d(-5px, 0, 0); } 60% { transform: translate3d(5px, 0, 0); } }
        
        .celebrate { animation: ios-scale 0.5s cubic-bezier(0.25, 1.35, 0.5, 1); }
        @keyframes ios-scale { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.035); } }
        
        @keyframes letter-pop {
            0% { transform: scale(0.8) translateY(4px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
        .letter-pop { animation: letter-pop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        .ghost-input { position: absolute; top: -9999px; left: -9999px; opacity: 0; }
        
        #virtualKeyboard button { transition: background-color 0.1s ease, transform 0.1s ease; }
        #virtualKeyboard button:active { background-color: rgba(0, 0, 0, 0.15) !important; transform: scale(0.95); }
        .dark #virtualKeyboard button:active { background-color: rgba(255, 255, 255, 0.15) !important; }

        @media (min-width: 768px) {
            #virtualKeyboard { max-width: 480px; margin-left: auto; margin-right: auto; }
        }
    </style>
</head>
<body class="text-iosText-light dark:text-iosText-dark min-h-screen p-3 flex flex-col items-center justify-center">

    <button id="globalThemeBtn" class="fixed top-6 right-3 z-50 p-2 bg-white/70 dark:bg-black/30 backdrop-blur-xl rounded-full shadow-lg border border-white/20 dark:border-white/5 active:scale-90 transition-all duration-200">
        <span class="dark:hidden text-lg">🌙</span>
        <span class="hidden dark:inline text-lg">☀️</span>
    </button>

    <!-- Password Screen -->
    <div id="passwordScreen" class="w-full max-w-sm bg-white/50 dark:bg-[#141419]/50 backdrop-blur-3xl p-8 my-auto rounded-[32px] ios-depth text-center border border-white/40 dark:border-white/5 transition-all">
        <div class="text-6xl mb-5 drop-shadow-md animate-bounce">🔑</div>
        <h2 class="text-2xl font-bold tracking-tight mb-1">Xinyi SpellQuest</h2>
        <p class="text-gray-500 dark:text-gray-400 text-xs font-semibold tracking-wide mb-6 uppercase">Please type the passkey</p>
        <input type="password" id="sitePassword" class="w-full p-4 bg-black/[0.03] dark:bg-white/[0.03] rounded-2xl text-center text-2xl tracking-widest focus:bg-white/90 dark:focus:bg-black/90 focus:ring-4 focus:ring-[#007aff]/30 mb-5 transition-all border border-black/5 dark:border-white/5 placeholder-gray-400" placeholder="••••••">
        <button id="loginBtn" class="w-full bg-[#007aff] hover:bg-[#0a84ff] text-white py-4 rounded-2xl font-semibold text-sm transition-all active:scale-[0.98] shadow-lg shadow-[#007aff]/20">Explore the world</button>
        <p id="passwordError" class="text-[#ff453a] text-xs font-semibold mt-3 hidden">⚠️ Wrong passkey，Try again</p>
    </div>

    <!-- Main Game UI -->
    <div id="gameContent" class="w-full max-w-md hidden html-down flex flex-col flex-1 justify-center h-full overflow-hidden">
        
        <!-- 优化：增加 mt-2（上外边距），使 header 整体在视觉 and 结构上下移，避开系统触控死角 -->
        <header class="w-full bg-white/30 dark:bg-black/20 backdrop-blur-2xl sticky top-0 z-40 border border-white/30 dark:border-white/5 py-2 px-3 rounded-2xl shadow-[0_4px_24px_rgba(0,0,0,0.01)] mt-2 mb-1.5 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-1.5 flex-1 min-w-0">
                <svg class="w-7 h-7 drop-shadow-md flex-shrink-0" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
                    <path d="M40,90 C40,40 160,40 160,90 L170,110 C140,115 60,115 30,110 Z" fill="#a1887f"/>
                    <ellipse cx="100" cy="110" rx="75" ry="10" fill="#8d6e63"/>
                    <circle cx="100" cy="125" r="30" fill="#ffcc80"/>
                    <circle cx="90" cy="120" r="3" fill="#333"/>
                    <circle cx="110" cy="120" r="3" fill="#333"/>
                    <path d="M92,130 Q100,140 108,130" fill="none" stroke="#ff7043" stroke-width="2" stroke-linecap="round"/>
                    <path d="M68,120 Q65,145 75,145 M132,120 Q135,145 125,145" fill="none" stroke="#5d4037" stroke-width="8" stroke-linecap="round"/>
                    <g transform="translate(145, 140) rotate(-35)">
                        <rect x="-3" y="-20" width="6" height="30" rx="2" fill="#81d4fa"/>
                        <polygon points="0,-28 -4,-20 4,-20" fill="#fff59d"/>
                        <circle cx="0" cy="-32" r="4" fill="#e0f7fa" opacity="0.8"/>
                    </g>
                    <g font-family="Arial, sans-serif" font-weight="bold" font-size="22" text-anchor="middle">
                        <text x="50" y="55" fill="#4285f4" transform="rotate(-15 50 55)">A</text>
                        <text x="100" y="35" fill="#ea4335">B</text>
                        <text x="150" y="55" fill="#fabc05" transform="rotate(15 150 55)">C</text>
                    </g>
                </svg>
                <h1 class="text-xs font-bold tracking-tight text-left truncate">XiyiSpellQuet</h1>
            </div>
            
            <div id="unitSelectorTrigger" class="relative flex items-center justify-center bg-black/[0.04] dark:bg-white/[0.04] hover:bg-black/[0.08] dark:hover:bg-white/[0.08] active:scale-95 transition-all duration-200 px-3 py-1.5 rounded-xl text-[10px] font-bold text-center cursor-pointer max-w-[160px] flex-1 mx-1.5 border border-black/[0.02] dark:border-white/[0.02] z-50">
                <span id="activeUnitName" class="truncate pr-3 text-gray-800 dark:text-gray-200 relative z-20">正在加载...</span>
                <span class="absolute right-2 text-[7px] opacity-40 z-20">▼</span>
                <select id="unitSelector" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full z-30"></select>
            </div>
            
            <div class="flex items-center gap-1.5 flex-shrink-0">
                <div class="flex flex-col items-end pr-0.5 justify-center">
                    <span id="navProgress" class="text-[10px] font-extrabold text-[#007aff] dark:text-[#0a84ff]">0%</span>
                </div>
                <button id="themeToggleBtn" class="p-1.5 bg-black/[0.04] dark:bg-white/[0.04] hover:bg-black/[0.08] dark:hover:bg-white/[0.08] rounded-lg active:scale-90 transition">
                    <span class="dark:hidden text-xs">🌙</span>
                    <span class="hidden dark:inline text-xs">☀️</span>
                </button>
            </div>
        </header>
        
        <!-- Wizard Growth & Check-in Panel -->
        <div id="wizardPanel" class="w-full bg-gradient-to-r from-violet-500/10 via-fuchsia-500/10 to-indigo-500/10 dark:from-violet-500/15 dark:via-fuchsia-500/15 dark:to-indigo-500/15 backdrop-blur-2xl p-2 rounded-xl shadow-sm border border-violet-500/20 dark:border-violet-500/30 flex flex-col gap-1 mb-1.5 flex-shrink-0">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-1.5">
                    <span class="text-base">🧙‍♂️</span>
                    <div class="flex flex-col">
                        <div class="flex items-center gap-1">
                            <span id="wizardLevelBadge" class="text-[9px] bg-violet-600 text-white font-extrabold px-1.5 py-0.5 rounded-md leading-none shadow-sm shadow-violet-600/20">Lv.1</span>
                            <span id="wizardTitle" class="text-[10px] font-bold text-violet-700 dark:text-violet-300">见习魔法学徒</span>
                        </div>
                        <span id="wizardExpText" class="text-[8px] font-semibold text-gray-500 dark:text-gray-400 mt-0.5">0 / 100 EXP</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-1.5">
                    <!-- Daily Streak -->
                    <div class="flex items-center gap-0.5 bg-amber-500/10 dark:bg-amber-500/25 px-1.5 py-0.5 rounded-lg border border-amber-500/20">
                        <span class="text-[10px]">🔥</span>
                        <span id="wizardStreak" class="text-[9px] font-extrabold text-amber-600 dark:text-amber-400">0天</span>
                    </div>
                    
                    <!-- Star Points -->
                    <div class="flex items-center gap-0.5 bg-fuchsia-500/10 dark:bg-fuchsia-500/25 px-1.5 py-0.5 rounded-lg border border-fuchsia-500/20">
                        <span class="text-[10px]">✨</span>
                        <span id="wizardStars" class="text-[9px] font-extrabold text-fuchsia-600 dark:text-fuchsia-400">0</span>
                    </div>

                    <!-- Ebbinghaus Due Reminder -->
                    <div id="ebbinghausDueReminder" class="flex items-center gap-0.5 bg-rose-500/10 dark:bg-rose-500/25 px-1.5 py-0.5 rounded-lg border border-rose-500/20 hover:scale-105 active:scale-95 cursor-pointer transition-all hidden">
                        <span class="text-[10px]">⏳</span>
                        <span id="ebbinghausDueCount" class="text-[9px] font-extrabold text-rose-600 dark:text-rose-400">待复习 0</span>
                    </div>

                    <!-- Daily Check-In Button -->
                    <button id="wizardCheckInBtn" class="bg-gradient-to-r from-violet-600 to-indigo-600 text-white font-bold text-[9px] px-2 py-1 rounded-lg shadow-md shadow-indigo-600/15 active:scale-95 transition-all duration-200">打卡</button>
                </div>
            </div>
            
            <!-- Exp Progress Bar -->
            <div class="w-full bg-violet-600/5 dark:bg-white/5 rounded-full h-1.5 overflow-hidden border border-violet-500/5">
                <div id="wizardExpBar" class="bg-gradient-to-r from-violet-500 via-fuchsia-500 to-indigo-500 h-full w-0 transition-all duration-500 ease-out"></div>
            </div>
        </div>
        
        <div class="w-full flex flex-col gap-1 mb-1.5 bg-white/30 dark:bg-black/15 backdrop-blur-2xl p-1.5 rounded-xl shadow-[0_4px_24px_rgba(0,0,0,0.01)] border border-white/20 dark:border-white/5 flex-shrink-0">
            <div class="flex gap-1.5 items-center">
                <div class="relative flex-1 bg-black/[0.04] dark:bg-white/[0.04] rounded-lg px-1 border border-black/[0.01] dark:border-white/[0.01]">
                    <select id="groupSelector" class="w-full py-1 bg-transparent rounded-lg text-[10px] font-bold cursor-pointer text-center appearance-none text-iosText-light dark:text-iosText-dark">
                        <option value="newConcept">🎒 少儿新概念</option>
                        <option value="schoolClass">🏫 学校课堂组</option>
                        <option value="ieltsClass">🗽 雅思词汇</option>
                    </select>
                </div>
                <button id="resetProgressBtn" class="text-[9px] font-bold text-gray-500 dark:text-gray-400 hover:text-[#ff453a] px-2 py-1 bg-white/40 dark:bg-white/[0.04] border border-black/[0.05] dark:border-white/[0.05] rounded-lg shadow-sm transition-all flex-shrink-0 active:scale-95">🔄 重置单元</button>
            </div>
            
            <div class="grid grid-cols-2 gap-1.5 items-center">
                <div class="bg-black/[0.03] dark:bg-white/[0.03] py-0.5 px-1.5 rounded-lg flex items-center justify-between border border-black/[0.01] dark:border-white/[0.01] h-[22px]">
                    <span class="text-[8px] font-semibold text-gray-500 dark:text-gray-400">口音</span>
                    <div class="flex gap-1.5">
                        <label class="flex items-center gap-0.5 text-[9px] font-semibold cursor-pointer">
                            <input type="radio" name="accentType" value="2" checked class="w-2.5 h-2.5 accent-[#007aff]"> 美
                        </label>
                        <label class="flex items-center gap-0.5 text-[9px] font-semibold cursor-pointer">
                            <input type="radio" name="accentType" value="1" class="w-2.5 h-2.5 accent-[#007aff]"> 英
                        </label>
                    </div>
                </div>

                <div class="relative flex bg-black/[0.05] dark:bg-white/[0.05] p-0.5 rounded-lg h-[22px]">
                    <div id="segment-indicator" class="absolute top-0.5 bottom-0.5 left-0.5 w-[calc(50%-2px)] bg-white dark:bg-[#1c1c1e] rounded-[6px] shadow-md transition-transform duration-300 ease-out z-0"></div>
                    <button id="mode-spell-btn" class="flex-1 rounded-[6px] font-bold text-[9px] transition-colors duration-200 text-iosText-light dark:text-iosText-dark relative z-10">拼读挑战</button>
                    <button id="mode-card-btn" class="flex-1 rounded-[6px] font-medium text-[9px] transition-colors duration-200 text-gray-400 dark:text-gray-500 relative z-10">卡片背诵</button>
                </div>
            </div>
        </div>

        <div id="mainCard" class="card-perspective my-0.5">
            <div id="cardInner" class="card-inner">
                
                <div class="card-front bg-white/40 dark:bg-black/20 backdrop-blur-3xl p-3 rounded-[28px] ios-depth absolute">
                    <!-- Floating Controls -->
                    <button id="exitReviewBtn" class="absolute top-3 left-3 z-30 bg-black/10 dark:bg-white/10 px-2.5 py-1 rounded-full text-[9px] font-bold text-gray-600 dark:text-gray-300 active:scale-90 transition-all duration-200 hidden">
                        🔙 退出温习
                    </button>
                    <div>
                        <div class="flex justify-between items-center text-[9px] font-semibold text-gray-400 dark:text-gray-500 mb-1 px-0.5">
                            <span id="progressTitle">冒险进度</span>
                            <span id="progressText" class="text-[#007aff] font-bold">0%</span>
                        </div>
                        <div class="progress-container">
                            <div id="progressBar" class="progress-bar" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="p-3 bg-black/[0.02] dark:bg-white/[0.02] rounded-2xl text-center flex-1 flex flex-col justify-between items-center min-h-[140px] max-h-[190px] relative border border-black/[0.04] dark:border-white/[0.04] shadow-[inset_0_2px_8px_rgba(0,0,0,0.02)] dark:shadow-[inset_0_2px_12px_rgba(0,0,0,0.2)] my-2 overflow-hidden">
                        
                        <div class="flex items-center justify-center gap-3 w-full h-[64px] flex-shrink-0">
                            <div id="emoji" class="text-4xl filter drop-shadow-md flex-shrink-0 transition-transform duration-300 hover:scale-110">🍎</div>
                            <div id="netImageContainer" class="hidden relative w-[54px] h-[54px] rounded-[12px] overflow-hidden bg-white/80 dark:bg-black/40 shadow-md border border-black/5 dark:border-white/5 flex-shrink-0">
                                <div id="imageShimmer" class="shimmer absolute inset-0 z-10"></div>
                                <img id="netImage" src="" class="opacity-0 transition-opacity duration-300 z-20 block w-full h-full object-cover absolute top-0 left-0" alt="illustration">
                            </div>
                        </div>
                        
                        <div id="spellHintArea" class="h-[24px] flex items-center justify-center w-full flex-shrink-0">
                            <div id="descContainer" class="hidden flex flex-col items-center">
                                <span id="desc" class="text-xs font-bold text-gray-800 dark:text-gray-100 truncate max-w-[280px]">正在加载...</span>
                                <span id="phonetic" class="text-[9px] text-[#007aff] dark:text-[#0a84ff] font-mono tracking-wide leading-none mt-0.5"></span>
                            </div>
                            <button id="hintBtn" class="text-[9px] font-bold text-gray-500 dark:text-gray-400 bg-white/80 dark:bg-white/[0.04] border border-black/5 dark:border-white/5 px-3 py-1 rounded-full shadow-sm active:scale-95 transition-all">显示中文提示</button>
                        </div>

                        <div id="letterSlots" class="flex justify-center flex-wrap gap-1 text-lg font-bold tracking-wide h-[32px] w-full px-1 items-end overflow-hidden mb-1"></div>

        async function sha256(str) {
            const buffer = new TextEncoder().encode(str);
            const hash = await crypto.subtle.digest('SHA-256', buffer);
            return Array.from(new Uint8Array(hash))
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');
        }

        async function verifyPassword() {
            const input = el.passInp.value;
            const inputHash = await sha256(input);
            if (inputHash === CONFIG.HASH) {
                getAudioContext();
                el.audio.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==";
                el.audio.play().then(() => {
                    el.passScreen.classList.add('hidden');
                    el.globalThemeBtn.classList.add('hidden');
                    el.gameContent.classList.remove('hidden');
                    updateUnitOptions(true);
                }).catch(() => {
                    el.passScreen.classList.add('hidden');
                    el.globalThemeBtn.classList.add('hidden');
                    el.gameContent.classList.remove('hidden');
                    updateUnitOptions(true);
                });
            } else {
                el.passInp.classList.add('shake');
                el.passwordError.classList.remove('hidden');
                el.passInp.value = '';
                setTimeout(() => el.passInp.classList.remove('shake'), 400);
            }
        }

        function loadSavedPreferences() {
            const theme = localStorage.getItem('spell_dark_mode');
            if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
            
            const group = localStorage.getItem('spell_saved_group');
            if (group && CONFIG.COURSE_DATA[group]) {
                el.groupSelector.value = group;
            }

            const wrongs = localStorage.getItem('spell_saved_wrong_words');
            if (wrongs) {
                try { 
                    state.wrongWords = JSON.parse(wrongs); 
                } catch(e){}
            }

            // Load Wizard State
            const wizardSaved = localStorage.getItem('spellquest_wizard');
            if (wizardSaved) {
                try {
                    state.wizard = { ...state.wizard, ...JSON.parse(wizardSaved) };
                } catch(e){}
            }
            
            // Load Vocabulary Book
            const vocabSaved = localStorage.getItem('spell_saved_vocab_book');
            if (vocabSaved) {
                try {
                    state.vocabWords = JSON.parse(vocabSaved);
                } catch(e){}
            }

            // Load Ebbinghaus History
            state.ebbinghausHistory = {};
            const ebbinghausSaved = localStorage.getItem('spell_ebbinghaus_history');
            if (ebbinghausSaved) {
                try {
                    state.ebbinghausHistory = JSON.parse(ebbinghausSaved);
                } catch(e){}
            }

            updateWizardUI();
            updateReinforcementCounts();
            calculateAndInjectEbbinghausReviews();
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('spell_dark_mode', isDark ? 'dark' : 'light');
        }
        
        async function loadCSV(url, isInitial = false) {
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const text = await response.text();
                parseRawText(text, isInitial);
            } catch (err) {
                showLoadError("未发现词库文件");
            }
        }

        function parseRawText(text, isInitial = false) {
            Papa.parse(text, {
                header: true, skipEmptyLines: true,
                complete: r => {
                    if (r.data?.length > 0) {
                        el.localDropZone.classList.add('hidden');
                        state.wordBank = r.data;
                        state.masteredWords.clear();
                        state.currentIndex = isInitial ? parseInt(localStorage.getItem('spell_saved_index') || 0) : 0;
                        if (state.currentIndex >= state.wordBank.length) {
                            state.currentIndex = 0;
                        }
                        showCurrentWord();
                    } else {
                        showLoadError("数据空空如也");
                    }
                }
            });
        }

        function showCurrentWord() {
            let bank = state.wordBank;
            if (state.isReviewMode) {
                bank = state.wrongWords;
                document.getElementById('progressTitle').textContent = "错词攻坚进度";
            } else if (state.isVocabMode) {
                bank = state.vocabWords;
                document.getElementById('progressTitle').textContent = "生词强化进度";
            } else {
                document.getElementById('progressTitle').textContent = "冒险进度";
            }

            if (bank.length === 0) {
                if (state.isReviewMode) {
                    state.isReviewMode = false;
                    showToast("🎉 错词攻坚完成！继续前进吧！");
                } else if (state.isVocabMode) {
                    state.isVocabMode = false;
                    showToast("🎉 生词本消灭干净！你太棒了！");
                } else {
                    showLoadError("该组词库没有单词哦");
                    return;
                }
                bank = state.wordBank;
                state.currentIndex = 0;
                document.getElementById('progressTitle').textContent = "冒险进度";
            }

            if (state.currentIndex >= bank.length) {
                triggerEpicFireworks();
                if (state.isReviewMode) {
                    showToast("🎉 错词全部消灭干净！");
                    state.isReviewMode = false;
                } else if (state.isVocabMode) {
                    showToast("🎉 生词全部强化完毕！");
                    state.isVocabMode = false;
                } else {
                    showToast("🎉 已完成本单元！");
                }
                state.currentIndex = 0;
                bank = state.wordBank;
                document.getElementById('progressTitle').textContent = "冒险进度";
            }

            const wordObj = bank[state.currentIndex];
            if (!wordObj?.word) return;

            state.side = 'front';
            el.cardInner.classList.remove('is-flipped');
            
            const cleanWord = wordObj.word.trim();
            state.currentInputValue = "";
            el.userInput.value = "";
            state.maxLetters = cleanWord.replace(/[^a-zA-Z]/g, "").length;

            el.emoji.textContent = wordObj.emoji || "📝";
            renderSlots(cleanWord);
            updateUIStrings(wordObj);
            fetchNetworkImage(cleanWord);
            fetchPhonetic(cleanWord);
            updateProgress();
            updateReinforcementCounts();

            if (!state.isReviewMode && !state.isVocabMode && state.mode === 'spell') {
                localStorage.setItem('spell_saved_index', state.currentIndex);
            }
            
            setTimeout(speakWord, 100);
        }

        function updateUIStrings(wordObj) {
            if (state.mode === 'spell') {
                el.desc.textContent = wordObj.desc || "";
                el.descContainer.classList.add('hidden');
                el.hintBtn.classList.remove('hidden');
            } else {
                el.cardWord.textContent = wordObj.word;
                el.cardDesc.textContent = wordObj.desc || "";
                // Card recitation mode: immediately show description/clue on front!
                el.desc.textContent = wordObj.desc || "";
                el.descContainer.classList.remove('hidden');
                el.hintBtn.classList.add('hidden');
            }
        }

        function filterInput(input) {
            let val = input.value.replace(/[^a-zA-Z]/g, '').toLowerCase();
            if (val.length > state.maxLetters) val = val.slice(0, state.maxLetters);
            state.currentInputValue = val;
            input.value = val;
            updateSlots();
        }

        function updateSlots() {
            const slots = el.letterSlots.children;
            let inputIdx = 0;
            for (let i = 0; i < slots.length; i++) {
                if (slots[i].dataset.special === "true") continue;
                if (slots[i].dataset.char === " ") continue;

                if (inputIdx < state.currentInputValue.length) {
                    const char = state.currentInputValue[inputIdx];
                    if (slots[i].textContent === "•") slots[i].classList.add("letter-pop");
                    slots[i].textContent = char;
                    slots[i].className = "text-[#007aff] dark:text-[#34a8ff] font-extrabold border-b-[2px] border-[#007aff] dark:border-[#34a8ff] px-0.5 leading-none transition-all lowercase letter-pop";
                } else {
                    slots[i].textContent = "•";
                    slots[i].classList.remove("letter-pop");
                    slots[i].className = "text-[#8e8e93] dark:text-zinc-500 font-black px-0.5 transition-all leading-none opacity-80";
                }
                inputIdx++;
            }
        }

        function check() {
            if (state.mode !== 'spell' || state.isTrans) return;
            const bank = state.isReviewMode ? state.wrongWords : (state.isVocabMode ? state.vocabWords : state.wordBank);
            
            if (!bank || state.currentIndex >= bank.length || !bank[state.currentIndex]) {
                return;
            }
            
            const target = bank[state.currentIndex].word.replace(/[^a-zA-Z]/g, '').toLowerCase();
            
            if (state.currentInputValue === target) {
                state.isTrans = true;
                playSound('success');
                el.cardInner.classList.add('celebrate');

                // Reward wizard
                let expGained = 10;
                let starsGained = 1;
                
                if (state.isReviewMode) {
                    expGained = 20; // Extra reward for wrong word tackling
                    starsGained = 2;
                } else if (state.isVocabMode) {
                    expGained = 15; // Extra reward for vocab training
                    starsGained = 2;
                }
                
                // Add exp and stars
                setTimeout(() => {
                    addExp(expGained);
                    state.wizard.stars += starsGained;
                    saveWizardState();
                    updateWizardUI();
                }, 100);

                // Update Ebbinghaus state on success
                updateEbbinghausState(bank[state.currentIndex], true);

                // iOS Safari Audio Preload: preload the next word's pronunciation inside user gesture handler!
                try {
                    let nextIdx = state.currentIndex;
                    let tempBank = [...bank];
                    if (state.isReviewMode || state.isVocabMode) {
                        tempBank.splice(state.currentIndex, 1);
                    } else {
                        nextIdx = state.currentIndex + 1;
                    }
                    if (tempBank.length > 0) {
                        if (nextIdx >= tempBank.length) nextIdx = 0;
                        const nextWord = tempBank[nextIdx]?.word;
                        if (nextWord) {
                            const accent = document.querySelector('input[name="accentType"]:checked').value;
                            el.audio.src = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(nextWord)}&type=${accent}`;
                            el.audio.load();
                        }
                    }
                } catch (e) {}

                setTimeout(() => {
                    el.cardInner.classList.remove('celebrate');
                    if (state.isReviewMode) {
                        state.wrongWords.splice(state.currentIndex, 1);
                        localStorage.setItem('spell_saved_wrong_words', JSON.stringify(state.wrongWords));
                        updateReinforcementCounts();
                    } else if (state.isVocabMode) {
                        state.vocabWords.splice(state.currentIndex, 1);
                        localStorage.setItem('spell_saved_vocab_book', JSON.stringify(state.vocabWords));
                        updateReinforcementCounts();
                    } else {
                        state.currentIndex++;
                    }
                    state.isTrans = false;
                    showCurrentWord();
                }, 400);
            } else {
                state.isTrans = true;
                playSound('error');
                el.cardInner.classList.add('shake');
                if (!state.isReviewMode && !state.isVocabMode) {
                    const exists = state.wrongWords.some(w => w.word === bank[state.currentIndex].word);
                    if (!exists) {
                        state.wrongWords.push(bank[state.currentIndex]);
                        localStorage.setItem('spell_saved_wrong_words', JSON.stringify(state.wrongWords));
                        updateReinforcementCounts();
                    }
                }
                // Update Ebbinghaus state on failure
                updateEbbinghausState(bank[state.currentIndex], false);
                setTimeout(() => {
                    el.cardInner.classList.remove('shake');
                    state.currentInputValue = "";
                    el.userInput.value = "";
                    updateSlots();
                    state.isTrans = false;
                }, 450);
            }
        }

        function fetchPhonetic(word) {
            el.phonetic.textContent = "";
            el.cardPhonetic.textContent = "";
            if (!word || word.includes(" ")) return;

            fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word.toLowerCase())}`)
                .then(r => r.json())
                .then(data => {
                    const ph = data[0]?.phonetic || data[0]?.phonetics?.find(p => p.text)?.text;
                    if (ph) {
                        el.phonetic.textContent = ph;
                        el.cardPhonetic.textContent = ph;
                    }
                }).catch(()=>{});
        }

        function fetchNetworkImage(word) {
            state.imgRetryCount = 0;
            el.netImageContainer.classList.remove('hidden');
            el.imageShimmer.classList.remove('hidden');
            el.netImage.classList.add('opacity-0');
            el.netImage.src = `https://tse1-mm.cn.bing.net/th/id/OIP?q=${encodeURIComponent(word + " illustration")}&w=160&h=160&c=7&rs=1&p=0&dpr=2`;
            
            el.netImage.onload = () => {
                el.imageShimmer.classList.add('hidden');
                el.netImage.classList.remove('opacity-0');
            };
        }

        function handleImageError() {
            if (state.imgRetryCount === 0) {
                state.imgRetryCount = 1;
                el.netImage.src = `https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=160&auto=format&fit=crop`;
            } else {
                el.netImageContainer.classList.add('hidden');
            }
        }

        function speakWord() {
            const word = getCurrentWordObject()?.word;
            if (!word) return;
            getAudioContext(); 
            const accent = document.querySelector('input[name="accentType"]:checked').value;
            const targetSrc = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=${accent}`;
            
            // iOS Safari optimization: do not re-assign src if already set to correct pronunciation.
            // Re-assigning resets the media engine and triggers autoplay restrictions outside user gestures.
            if (!el.audio.src.includes(encodeURIComponent(word)) || !el.audio.src.includes(`type=${accent}`)) {
                el.audio.src = targetSrc;
            }
            el.audio.play().catch(()=>{});
        }

        function renderVirtualKeyboard() {
            CONFIG.KBD_ROWS.forEach((row, i) => {
                const rowEl = document.getElementById(`kbd-row${i+1}`);
                rowEl.innerHTML = "";
                
                if (i === 0) { // Row 1
                    row.forEach(key => {
                        const btn = document.createElement('button');
                        btn.textContent = key;
                        btn.className = "col-span-2 bg-white/80 dark:bg-[#2c2c2e]/80 text-iosText-light dark:text-iosText-dark font-semibold text-base py-2 md:py-2.5 rounded-xl shadow-md border border-white/20 dark:border-white/[0.03] transition-all";
                        
                        const keyHandler = (e) => {
                            e.preventDefault();
                            getAudioContext(); 
                            handleKeyInput(key);
                        };
                        btn.addEventListener('touchend', keyHandler);
                        btn.addEventListener('mousedown', (e) => {
                            if ('ontouchstart' in window) return; 
                            keyHandler(e);
                        });
                        rowEl.appendChild(btn);
                    });
                } else if (i === 1) { // Row 2
                    row.forEach((key, idx) => {
                        const btn = document.createElement('button');
                        btn.textContent = key;
                        // First key gets col-start-2 to achieve half-key margin on both sides
                        const startClass = idx === 0 ? "col-start-2 " : "";
                        btn.className = startClass + "col-span-2 bg-white/80 dark:bg-[#2c2c2e]/80 text-iosText-light dark:text-iosText-dark font-semibold text-base py-2 md:py-2.5 rounded-xl shadow-md border border-white/20 dark:border-white/[0.03] transition-all";
                        
                        const keyHandler = (e) => {
                            e.preventDefault();
                            getAudioContext(); 
                            handleKeyInput(key);
                        };
                        btn.addEventListener('touchend', keyHandler);
                        btn.addEventListener('mousedown', (e) => {
                            if ('ontouchstart' in window) return; 
                            keyHandler(e);
                        });
                        rowEl.appendChild(btn);
                    });
                } else if (i === 2) { // Row 3
                    // Left spacer spanning 3 columns (1.5 standard keys)
                    const spacerLeft = document.createElement('div');
                    spacerLeft.className = "col-span-3";
                    rowEl.appendChild(spacerLeft);

                    row.forEach(key => {
                        const btn = document.createElement('button');
                        btn.textContent = key;
                        if (key === "⌫") {
                            // Backspace spans 3 columns (1.5 standard keys)
                            btn.className = "col-span-3 bg-[#8e8e93] dark:bg-zinc-600 text-white font-bold text-base py-2 md:py-2.5 rounded-xl shadow-md border border-white/10 transition-all";
                        } else {
                            btn.className = "col-span-2 bg-white/80 dark:bg-[#2c2c2e]/80 text-iosText-light dark:text-iosText-dark font-semibold text-base py-2 md:py-2.5 rounded-xl shadow-md border border-white/20 dark:border-white/[0.03] transition-all";
                        }
                        
                        const keyHandler = (e) => {
                            e.preventDefault();
                            getAudioContext(); 
                            handleKeyInput(key === "⌫" ? "BACKSPACE" : key);
                        };
                        btn.addEventListener('touchend', keyHandler);
                        btn.addEventListener('mousedown', (e) => {
                            if ('ontouchstart' in window) return; 
                            keyHandler(e);
                        });
                        rowEl.appendChild(btn);
                    });
                }
            });
        }

        function handleKeyInput(key) {
            if (state.mode !== 'spell') return;
            if (key === "BACKSPACE") {
                state.currentInputValue = state.currentInputValue.slice(0, -1);
            } else if (state.currentInputValue.length < state.maxLetters) {
                state.currentInputValue += key.toLowerCase();
            }
            el.userInput.value = state.currentInputValue;
            updateSlots();
        }

        function handleAnkiFeedback(level) {
            if (state.isTrans) return;
            const bank = state.isReviewMode ? state.wrongWords : (state.isVocabMode ? state.vocabWords : state.wordBank);
            if (bank.length === 0) return;

            state.isTrans = true;

            // iOS Safari Audio Preload: preload the next word's pronunciation inside user gesture handler!
            try {
                let nextIdx = state.currentIndex;
                let tempBank = [...bank];
                if (level === 'again') {
                    const item = tempBank.splice(state.currentIndex, 1)[0];
                    tempBank.push(item);
                } else if (level === 'good') {
                    nextIdx = state.currentIndex + 1;
                } else if (level === 'easy') {
                    tempBank.splice(state.currentIndex, 1);
                }
                if (tempBank.length > 0) {
                    if (nextIdx >= tempBank.length) nextIdx = 0;
                    const nextWord = tempBank[nextIdx]?.word;
                    if (nextWord) {
                        const accent = document.querySelector('input[name="accentType"]:checked').value;
                        el.audio.src = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(nextWord)}&type=${accent}`;
                        el.audio.load();
                    }
                }
            } catch (err) {}

            const currentItem = bank[state.currentIndex];
            if (level === 'again') {
                const item = bank.splice(state.currentIndex, 1)[0];
                bank.push(item);
                playSound('error');
                el.cardInner.classList.add('shake');
                setTimeout(() => el.cardInner.classList.remove('shake'), 450);
                
                updateEbbinghausState(currentItem, false);
            } else if (level === 'good') {
                state.currentIndex++;
                addExp(5);
                
                updateEbbinghausState(currentItem, true);
            } else if (level === 'easy') {
                state.masteredWords.add(bank[state.currentIndex].word);
                
                // If in vocab mode, make sure to save the updated vocab book!
                if (state.isVocabMode) {
                    bank.splice(state.currentIndex, 1);
                    localStorage.setItem('spell_saved_vocab_book', JSON.stringify(state.vocabWords));
                } else if (state.isReviewMode) {
                    bank.splice(state.currentIndex, 1);
                    localStorage.setItem('spell_saved_wrong_words', JSON.stringify(state.wrongWords));
                } else {
                    bank.splice(state.currentIndex, 1);
                }

                playSound('success');
                el.cardInner.classList.add('celebrate');
                setTimeout(() => el.cardInner.classList.remove('celebrate'), 400);

                addExp(15);
                state.wizard.stars += 1;
                saveWizardState();
                updateWizardUI();
                
                updateEbbinghausState(currentItem, true, true);
            }

            state.side = 'front';
            setTimeout(() => {
                el.cardInner.classList.remove('is-flipped');
                setTimeout(() => {
                    if (bank.length === 0) {
                        triggerEpicFireworks();
                        if (state.isReviewMode) {
                            showToast("🎉 错词消灭干净！");
                            state.isReviewMode = false;
                        } else if (state.isVocabMode) {
                            showToast("🎉 生词本消灭干净！");
                            state.isVocabMode = false;
                        } else {
                            showToast("🎉 全部掌握！");
                            resetAllProgress();
                        }
                        showCurrentWord();
                    } else {
                        if (state.currentIndex >= bank.length) state.currentIndex = 0;
                        showCurrentWord();
                    }
                    state.isTrans = false;
                }, 150);
            }, 250);
        }

        function renderSlots(word) {
            el.letterSlots.innerHTML = "";
            const isLong = word.length > 12;
            const sizeClass = isLong ? "text-xs" : "text-lg";

            [...word].forEach(char => {
                const span = document.createElement('span');
                span.dataset.char = char.toLowerCase();
                if (/[a-zA-Z]/.test(char)) {
                    span.textContent = "•";
                    span.className = `text-[#8e8e93] dark:text-zinc-500 leading-none ${sizeClass} px-0.5 text-center opacity-80`;
                } else if (char === " ") {
                    span.innerHTML = "&nbsp;";
                    span.className = `w-3 border-b border-transparent ${sizeClass}`;
                } else {
                    span.textContent = char;
                    span.dataset.special = "true";
                    span.className = `text-iosText-light dark:text-iosText-dark font-mono leading-none ${sizeClass} px-0.5`;
                }
                el.letterSlots.appendChild(span);
            });
        }

        function updateProgress() {
            const bank = state.isReviewMode ? state.wrongWords : (state.isVocabMode ? state.vocabWords : state.wordBank);
            const total = bank.length + state.masteredWords.size;
            let percent = 0;

            if (state.mode === 'spell') {
                percent = bank.length ? Math.round((state.currentIndex / bank.length) * 100) : 100;
            } else {
                percent = total ? Math.round((state.masteredWords.size / total) * 100) : 0;
                if (bank.length === 0) percent = 100;
            }

            const pStr = `${percent}%`;
            el.progressBar.style.width = pStr;
            el.progressText.textContent = state.mode === 'spell' ? pStr : `已掌握: ${pStr} (余 ${bank.length})`;
            el.navProgress.textContent = pStr;
        }

        function switchMode(mode) {
            state.mode = mode;
            state.side = 'front';
            el.cardInner.classList.remove('is-flipped');
            
            const isSpell = mode === 'spell';
            el.segmentIndicator.style.transform = isSpell ? 'translateX(0%)' : 'translateX(100%)';
            el.virtualKeyboard.classList.toggle('hidden', !isSpell);
            document.getElementById('spellActionButtons').classList.toggle('hidden', !isSpell);
            document.getElementById('cardFrontActionButtons').classList.toggle('hidden', isSpell);
            el.letterSlots.classList.toggle('hidden', !isSpell);
            
            showCurrentWord();
        }

        function handleCardTouchEnd(e) {
            if (state.mode !== 'card') return;
            const diffX = e.changedTouches[0].screenX - state.touch.x;
            const diffY = e.changedTouches[0].screenY - state.touch.y;
            
            // Only trigger horizontal swipe if horizontal displacement is greater than vertical
            if (Math.abs(diffX) > 60 && Math.abs(diffX) > Math.abs(diffY)) {
                e.preventDefault(); // Crucial: prevents simulated ghost-click events from leaking onto the next card!
                if (state.side === 'front') flipToBack();
                else handleAnkiFeedback(diffX < 0 ? 'again' : 'easy');
            }
        }

        function handlePhysicalKeyboard(e) {
            if (!el.passScreen.classList.contains('hidden')) return;
            if (document.activeElement === el.passInp) return;

            if (state.mode === 'card') {
                if (e.key === ' ') { 
                    e.preventDefault(); 
                    if (state.side === 'front') flipToBack(); 
                }
                if (state.side === 'back') {
                    if (e.key === '1') handleAnkiFeedback('again');
                    if (e.key === '2') handleAnkiFeedback('good');
                    if (e.key === '3') handleAnkiFeedback('easy');
                }
            } else {
                if (e.key === 'Backspace') { 
                    e.preventDefault(); 
                    handleKeyInput('BACKSPACE'); 
                } else if (e.key === 'Enter') { 
                    e.preventDefault(); 
                    check(); 
                } else if (/^[a-zA-Z]$/.test(e.key)) { 
                    e.preventDefault(); 
                    handleKeyInput(e.key); 
                }
            }
        }

        function onGroupChange() {
            state.isReviewMode = false;
            localStorage.setItem('spell_saved_group', el.groupSelector.value);
            updateUnitOptions();
        }

        function onUnitChange() {
            state.isReviewMode = false;
            localStorage.setItem('spell_saved_unit', el.unitSelector.value);
            localStorage.removeItem('spell_saved_index');
            
            // 实时渲染当前所选框文字
            el.activeUnitName.textContent = el.unitSelector.options[el.unitSelector.selectedIndex]?.text || "选择单元";
            loadCSV(el.unitSelector.value);
        }

        function updateUnitOptions(isInitial = false) {
            const group = el.groupSelector.value;
            const units = CONFIG.COURSE_DATA[group] || [];
            el.unitSelector.innerHTML = units.map(u => `<option value="${u.value}">${u.text}</option>`).join('');

            if (isInitial) {
                const saved = localStorage.getItem('spell_saved_unit');
                if (saved && units.some(u => u.value === saved)) {
                    el.unitSelector.value = saved;
                }
            }
            
            el.activeUnitName.textContent = el.unitSelector.options[el.unitSelector.selectedIndex]?.text || "选择单元";
            loadCSV(el.unitSelector.value, isInitial);
        }

        function toggleHint() { 
            el.descContainer.classList.remove('hidden'); 
            el.hintBtn.classList.add('hidden'); 
        }

        function flipToBack() { 
            state.side = 'back'; 
            el.cardInner.classList.add('is-flipped'); 
            speakWord(); 
        }
        
        function updateReinforcementCounts() {
            const wrongCount = state.wrongWords.length;
            const vocabCount = state.vocabWords.length;
            
            if (el.wrongCount) el.wrongCount.textContent = wrongCount;
            if (el.vocabCount) el.vocabCount.textContent = vocabCount;
            
            const isInReinforcement = state.isReviewMode || state.isVocabMode;
            if (el.exitReviewBtn) {
                el.exitReviewBtn.classList.toggle('hidden', !isInReinforcement);
            }
            
            // Sync Star toggle color for current word
            const currentWord = getCurrentWordObject();
            const isStarred = currentWord && state.vocabWords.some(w => w.word.toLowerCase() === currentWord.word.toLowerCase());
            
            if (el.vocabToggleBtnFront) {
                el.vocabToggleBtnFront.classList.toggle('text-amber-500', !!isStarred);
                el.vocabToggleBtnFront.classList.toggle('text-gray-400', !isStarred);
                el.vocabToggleBtnFront.classList.toggle('dark:text-gray-500', !isStarred);
            }
            if (el.vocabToggleBtnBack) {
                el.vocabToggleBtnBack.classList.toggle('text-amber-500', !!isStarred);
                el.vocabToggleBtnBack.classList.toggle('text-gray-400', !isStarred);
                el.vocabToggleBtnBack.classList.toggle('dark:text-gray-500', !isStarred);
            }
        }

        function reviewWrongWords() {
            if (state.wrongWords.length === 0) {
                showToast("🔥 错词库空空如也，真棒！");
                return;
            }
            state.isReviewMode = true;
            state.isVocabMode = false;
            state.currentIndex = 0;
            showCurrentWord();
        }

        function reviewVocabWords() {
            if (state.vocabWords.length === 0) {
                showToast("📖 智能生词本空空如也，快去收藏吧！");
                return;
            }
            state.isVocabMode = true;
            state.isReviewMode = false;
            state.currentIndex = 0;
            showCurrentWord();
        }

        function exitReviewMode() {
            state.isReviewMode = false;
            state.isVocabMode = false;
            state.currentIndex = parseInt(localStorage.getItem('spell_saved_index') || 0);
            showToast("🚪 已返回正常冒险");
            showCurrentWord();
        }

        function getCurrentWordObject() {
            const bank = state.isReviewMode ? state.wrongWords : (state.isVocabMode ? state.vocabWords : state.wordBank);
            return bank ? bank[state.currentIndex] : null;
        }

        function toggleVocab() {
            const currentWord = getCurrentWordObject();
            if (!currentWord || !currentWord.word) return;
            
            const index = state.vocabWords.findIndex(w => w.word.toLowerCase() === currentWord.word.toLowerCase());
            if (index > -1) {
                state.vocabWords.splice(index, 1);
                showToast("⚪ 已移出生词本");
            } else {
                state.vocabWords.push(currentWord);
                showToast("⭐ 已加入智能生词本 (+10 EXP)");
                addExp(10);
            }
            localStorage.setItem('spell_saved_vocab_book', JSON.stringify(state.vocabWords));
            updateReinforcementCounts();
        }

        // ==========================================
        //         WIZARD GROWTH SYSTEM
        // ==========================================
        function getLevelThreshold(level) {
            // Significant increase in difficulty (exponential scaling)
            return Math.floor(250 * Math.pow(1.5, level - 1) + 150 * level);
        }

        function getWizardTitle(level) {
            if (level <= 2) return "🔮 见习魔法学徒";
            if (level <= 4) return "🧪 药水配方师";
            if (level <= 6) return "⚡ 元素法术使";
            if (level <= 9) return "🌀 秘奥魔导士";
            return "👑 大魔导师";
        }

        function getTodayDateString() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function getYesterdayDateString() {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yyyy = yesterday.getFullYear();
            const mm = String(yesterday.getMonth() + 1).padStart(2, '0');
            const dd = String(yesterday.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function saveWizardState() {
            localStorage.setItem('spellquest_wizard', JSON.stringify(state.wizard));
        }

        function updateWizardUI() {
            if (el.wizardLevelBadge) el.wizardLevelBadge.textContent = `Lv.${state.wizard.level}`;
            if (el.wizardTitle) el.wizardTitle.textContent = getWizardTitle(state.wizard.level);
            if (el.wizardStreak) el.wizardStreak.textContent = `${state.wizard.streak}天`;
            if (el.wizardStars) el.wizardStars.textContent = state.wizard.stars;
            
            const threshold = getLevelThreshold(state.wizard.level);
            if (el.wizardExpText) el.wizardExpText.textContent = `${state.wizard.exp} / ${threshold} EXP`;
            
            const progress = Math.min(100, (state.wizard.exp / threshold) * 100);
            if (el.wizardExpBar) el.wizardExpBar.style.width = `${progress}%`;
            
            if (el.wizardCheckInBtn) {
                const todayStr = getTodayDateString();
                if (state.wizard.lastCheckIn === todayStr) {
                    el.wizardCheckInBtn.textContent = "已打卡";
                    el.wizardCheckInBtn.classList.add('opacity-60', 'pointer-events-none');
                } else {
                    el.wizardCheckInBtn.textContent = "打卡";
                    el.wizardCheckInBtn.classList.remove('opacity-60', 'pointer-events-none');
                }
            }
        }

        function addExp(amount) {
            state.wizard.exp += amount;
            showToast(`✨ EXP +${amount}`);
            checkLevelUp();
            saveWizardState();
            updateWizardUI();
        }

        function checkLevelUp() {
            let currentLvl = state.wizard.level;
            let threshold = getLevelThreshold(currentLvl);
            let leveledUp = false;
            
            while (state.wizard.exp >= threshold) {
                state.wizard.exp -= threshold;
                state.wizard.level++;
                currentLvl = state.wizard.level;
                threshold = getLevelThreshold(currentLvl);
                leveledUp = true;
            }
            
            if (leveledUp) {
                setTimeout(() => {
                    triggerLevelUpCelebration();
                }, 300);
            }
        }

        function triggerLevelUpCelebration() {
            triggerEpicFireworks();
            playSound('success');
            
            // Custom synthetic upgrade fan-fare sounds!
            try {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; // Beautiful rising C-Major arpeggio!
                notes.forEach((freq, idx) => {
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    osc.connect(g);
                    g.connect(ctx.destination);
                    osc.frequency.setValueAtTime(freq, now + idx * 0.12);
                    g.gain.setValueAtTime(0.08, now + idx * 0.12);
                    g.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.12 + 0.3);
                    osc.start(now + idx * 0.12);
                    osc.stop(now + idx * 0.12 + 0.3);
                });
            } catch(e){}
            
            const newTitle = getWizardTitle(state.wizard.level);
            showToast(`🎉 恭喜晋升为 [${newTitle}]！`);
        }

        function performDailyCheckIn() {
            getAudioContext();
            const todayStr = getTodayDateString();
            if (state.wizard.lastCheckIn === todayStr) {
                showToast("📅 今天已经打过卡啦，明天再来哦！");
                return;
            }
            
            const yesterdayStr = getYesterdayDateString();
            if (state.wizard.lastCheckIn === yesterdayStr) {
                state.wizard.streak++;
            } else if (state.wizard.lastCheckIn !== todayStr) {
                state.wizard.streak = 1;
            }
            
            state.wizard.lastCheckIn = todayStr;
            state.wizard.stars += 10;
            saveWizardState();
            updateWizardUI();
            
            addExp(50);
            playSound('success');
            triggerEpicFireworks();
            showToast(`📅 打卡成功！EXP +50, ✨ +10！`);
        }

        // ==========================================
        //         PRONUNCIATION CHANGER
        // ==========================================
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recognition = null;
        let isRecognizing = false;

        function startVoiceRecordingFallback() {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = event => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const audioUrl = URL.createObjectURL(audioBlob);
                        const userAudio = new Audio(audioUrl);
                        
                        showToast("👂 正在回放你的发音...");
                        userAudio.play();
                        
                        userAudio.onended = () => {
                            setTimeout(() => {
                                showToast("🔊 正在播放标准发音，对比一下吧！");
                                speakWord();
                            }, 500);
                        };
                        
                        addExp(5);
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    updatePronounceButtonState(true, "正在录音...");
                    
                    setTimeout(() => {
                        if (isRecording) {
                            stopVoiceRecording();
                        }
                    }, 3000);
                })
                .catch(err => {
                    showToast("⚠️ 无法获取麦克风权限，无法纠错发音");
                    updatePronounceButtonState(false, "纠错发音");
                });
        }

        function stopVoiceRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                updatePronounceButtonState(false, "纠错发音");
            }
        }

        function handlePronunciationCheck() {
            getAudioContext();
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                if (isRecording) {
                    stopVoiceRecording();
                } else {
                    startVoiceRecordingFallback();
                }
                return;
            }
            
            if (isRecognizing) {
                recognition.stop();
                return;
            }
            
            try {
                recognition = new SpeechRecognition();
                recognition.lang = 'en-US';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;
                
                recognition.onstart = () => {
                    isRecognizing = true;
                    updatePronounceButtonState(true, "倾听中...");
                };
                
                recognition.onerror = (event) => {
                    console.error("Speech recognition error", event);
                    showToast("⚠️ 识别出错，请重试");
                    isRecognizing = false;
                    updatePronounceButtonState(false, "纠错发音");
                };
                
                recognition.onend = () => {
                    isRecognizing = false;
                    updatePronounceButtonState(false, "纠错发音");
                };
                
                recognition.onresult = (event) => {
                    const currentWord = getCurrentWordObject();
                    if (!currentWord) return;
                    
                    const targetStr = currentWord.word.trim().toLowerCase().replace(/[^a-z]/g, '');
                    const spokenStr = event.results[0][0].transcript.trim().toLowerCase().replace(/[^a-z]/g, '');
                    
                    if (spokenStr === targetStr) {
                        playSound('success');
                        triggerEpicFireworks();
                        addExp(15);
                        state.wizard.stars += 2;
                        saveWizardState();
                        updateWizardUI();
                        
                        // Auto-fill
                        state.currentInputValue = currentWord.word.toLowerCase();
                        el.userInput.value = state.currentInputValue;
                        updateSlots();
                        
                        showToast(`🎯 完美发音！听到的是: "${event.results[0][0].transcript}" (+15 EXP, +2 ✨)`);
                    } else {
                        playSound('fail');
                        showToast(`😢 听到的是: "${event.results[0][0].transcript}"，可以再清晰点哦！`);
                        setTimeout(() => {
                            speakWord();
                        }, 1200);
                    }
                };
                
                recognition.start();
            } catch (e) {
                console.error(e);
                startVoiceRecordingFallback();
            }
        }

        function updatePronounceButtonState(active, text) {
            const textEl = document.getElementById('pronounceText');
            const iconEl = document.getElementById('pronounceIcon');
            const waveEl = document.getElementById('pronounceWave');
            
            if (active) {
                if (textEl) textEl.textContent = text;
                if (iconEl) iconEl.textContent = "🔴";
                if (waveEl) waveEl.style.transform = "scaleY(1)";
            } else {
                if (textEl) textEl.textContent = "纠错发音";
                if (iconEl) iconEl.textContent = "🎤";
                if (waveEl) waveEl.style.transform = "scaleY(0)";
            }
        }

        function resetAllProgress() {
            if (confirm("确定要重置当前进度吗？")) {
                state.currentIndex = 0;
                state.masteredWords.clear();
                localStorage.removeItem('spell_saved_index');
                showCurrentWord();
            }
        }

        function showToast(msg) {
            el.iosToast.textContent = msg;
            el.iosToast.classList.replace('opacity-0', 'opacity-100');
            el.iosToast.classList.replace('translate-y-2', 'translate-y-0');
            setTimeout(() => {
                el.iosToast.classList.replace('opacity-100', 'opacity-0');
                el.iosToast.classList.replace('translate-y-0', 'translate-y-2');
            }, 2000);
        }

        function playSound(type) {
            try {
                const ctx = getAudioContext();
                const osc = ctx.createOscillator();
                const g = ctx.createGain();
                osc.connect(g);
                g.connect(ctx.destination);
                if (type === 'success') {
                    osc.frequency.setValueAtTime(523, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
                } else {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2);
                }
                g.gain.setValueAtTime(0.1, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } catch (e) {}
            if (navigator.vibrate) {
                try {
                    navigator.vibrate(type === 'success' ? 20 : [40, 40]);
                } catch (e) {}
            }
        }

        function triggerEpicFireworks() {
            if (typeof confetti !== 'function') return;
            const end = Date.now() + 1500;
            (function frame() {
                try {
                    confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0, y: 0.8 } });
                    confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1, y: 0.8 } });
                } catch (e) {}
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        // 统一展示加载状态
        function showLoadError(msg) {
            el.desc.textContent = msg;
            el.descContainer.classList.remove('hidden');
            el.hintBtn.classList.add('hidden');
            el.emoji.textContent = "📂";
            el.localDropZone.classList.remove('hidden');
        }

        function handleFileSelect(input) {
            if (input.files?.[0]) {
                const reader = new FileReader();
                reader.onload = e => parseRawText(e.target.result);
                reader.readAsText(input.files[0]);
            }
        }

        // ==========================================
        //       EBBINGHAUS SPACED REPETITION
        // ==========================================
        function updateEbbinghausState(wordObj, isCorrect, isEasy = false) {
            if (!wordObj || !wordObj.word) return;
            const wordKey = wordObj.word.trim().toLowerCase();
            
            let record = state.ebbinghausHistory[wordKey];
            if (!record) {
                record = {
                    word: wordObj.word,
                    desc: wordObj.desc || "",
                    emoji: wordObj.emoji || "📝",
                    step: 0,
                    lastReview: 0,
                    nextReview: 0
                };
            }
            
            // Ebbinghaus review intervals (in hours):
            // Step 0: 30 minutes (0.5h)
            // Step 1: 12 hours
            // Step 2: 24 hours (1 day)
            // Step 3: 48 hours (2 days)
            // Step 4: 96 hours (4 days)
            // Step 5: 168 hours (7 days)
            // Step 6: 360 hours (15 days)
            // Step 7: 720 hours (30 days)
            const intervals = [0.5, 12, 24, 48, 96, 168, 360, 720];
            
            if (isCorrect) {
                if (isEasy) {
                    record.step = Math.min(intervals.length - 1, record.step + 2);
                } else {
                    record.step = Math.min(intervals.length - 1, record.step + 1);
                }
                const hrs = intervals[record.step];
                record.lastReview = Date.now();
                record.nextReview = Date.now() + hrs * 60 * 60 * 1000;
            } else {
                record.step = 0;
                record.lastReview = Date.now();
                record.nextReview = Date.now() + 10 * 60 * 1000; // 10 minutes
            }
            
            state.ebbinghausHistory[wordKey] = record;
            localStorage.setItem('spell_ebbinghaus_history', JSON.stringify(state.ebbinghausHistory));
            
            calculateAndInjectEbbinghausReviews();
        }

        function calculateAndInjectEbbinghausReviews() {
            const now = Date.now();
            let dueCount = 0;
            const dueList = [];
            
            for (const key in state.ebbinghausHistory) {
                const record = state.ebbinghausHistory[key];
                if (record.nextReview && record.nextReview <= now) {
                    dueCount++;
                    dueList.push(record);
                }
            }
            
            let wrongWordsChanged = false;
            const pendingDue = dueList.filter(dueItem => {
                return !state.wrongWords.some(w => w.word.trim().toLowerCase() === dueItem.word.trim().toLowerCase());
            });
            
            if (pendingDue.length > 0) {
                state.wrongWords = [...pendingDue.map(item => ({
                    word: item.word,
                    desc: item.desc,
                    emoji: item.emoji,
                    isEbbinghausPrioritized: true
                })), ...state.wrongWords];
                wrongWordsChanged = true;
            }
            
            if (wrongWordsChanged) {
                localStorage.setItem('spell_saved_wrong_words', JSON.stringify(state.wrongWords));
                updateReinforcementCounts();
            }
            
            const dueBadge = document.getElementById('ebbinghausDueReminder');
            const dueCountText = document.getElementById('ebbinghausDueCount');
            
            if (dueBadge && dueCountText) {
                dueCountText.textContent = `待复习 ${dueCount}`;
                if (dueCount > 0) {
                    dueBadge.classList.remove('hidden');
                } else {
                    dueBadge.classList.add('hidden');
                }
            }
        }

        init();
    </script>
